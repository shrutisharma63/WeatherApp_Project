<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nimbus Weather Hub</title>
  <meta name="description" content="Nimbus Weather Hub - Get real-time weather updates, forecasts, and alerts for any city worldwide.">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    #startup-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 99999;
      opacity: 1;
      visibility: visible;
      background: linear-gradient(160deg, #e0f2fe 0%, #bae6fd 28%, #7dd3fc 58%, #38bdf8 100%);
      transition: opacity 420ms ease, visibility 420ms ease;
    }

    #startup-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .startup-spinner {
      width: 56px;
      height: 56px;
      border: 5px solid rgba(15, 23, 42, 0.22);
      border-top-color: #0f172a;
      border-radius: 50%;
      animation: startup-spin 0.8s linear infinite;
    }

    .startup-label {
      font-family: Roboto, Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0.04em;
      color: #0f172a;
      font-weight: 500;
    }

    @keyframes startup-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="startup-loader" aria-live="polite" aria-label="Loading Nimbus Weather Hub">
    <div class="startup-spinner"></div>
    <div class="startup-label">Loading Nimbus Weather Hub...</div>
  </div>

  <app-root></app-root>

  <script>
    (function () {
      var loader = document.getElementById('startup-loader');
      if (!loader) {
        return;
      }

      var shownAt = Date.now();
      var hidden = false;

      function hideLoader() {
        if (hidden) {
          return;
        }
        hidden = true;
        loader.classList.add('is-hidden');
        window.setTimeout(function () {
          if (loader && loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 500);
      }

      function hideWithMinDelay() {
        var elapsed = Date.now() - shownAt;
        var wait = Math.max(0, 350 - elapsed);
        window.setTimeout(hideLoader, wait);
      }

      window.addEventListener('weather-ready', hideWithMinDelay, { once: true });
      window.addEventListener('load', function () {
        window.setTimeout(hideWithMinDelay, 900);
      }, { once: true });
      window.setTimeout(hideWithMinDelay, 6500);
    })();
  </script>
</body>
</html>
