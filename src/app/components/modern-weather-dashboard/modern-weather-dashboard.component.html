<div class="modern-weather-card">
  <!-- Hourly Forecast Row -->
  <div class="hourly-forecast">
    <div class="hourly-item current">
      <div class="time">Now</div>
      <div class="icon">☀️</div>
      <div class="temp">82°</div>
    </div>
    <div class="hourly-item">
      <div class="time">1 PM</div>
      <div class="icon">🌤️</div>
      <div class="temp">85°</div>
    </div>
    <div class="hourly-item">
      <div class="time">2 PM</div>
      <div class="icon">🌤️</div>
      <div class="temp">87°</div>
    </div>
    <div class="hourly-item">
      <div class="time">3 PM</div>
      <div class="icon">⛅</div>
      <div class="temp">88°</div>
    </div>
    <div class="hourly-item">
      <div class="time">4 PM</div>
      <div class="icon">☁️</div>
      <div class="temp">86°</div>
    </div>
    <div class="hourly-item">
      <div class="time">5 PM</div>
      <div class="icon">🌥️</div>
      <div class="temp">84°</div>
    </div>
    <div class="hourly-item">
      <div class="time">6 PM</div>
      <div class="icon">🌅</div>
      <div class="temp">82°</div>
    </div>
    <div class="hourly-item">
      <div class="time">7 PM</div>
      <div class="icon">🌙</div>
      <div class="temp">78°</div>
    </div>
  </div>

  <!-- Graph Section -->
  <div class="graph-section">
    <!-- Sunrise/Sunset markers -->
    <div class="sun-markers">
      <div class="sunrise">🌅 6:23 AM</div>
      <div class="sunset">🌇 6:30 PM</div>
    </div>
    
    <!-- Chart Container -->
    <div class="chart-container">
      <canvas #tempChart>
      </canvas>
    </div>
    
    <!-- Weather icons above graph points -->
    <div class="graph-icons">
      <div class="graph-icon">☀️</div>
      <div class="graph-icon">🌤️</div>
      <div class="graph-icon">⛅</div>
      <div class="graph-icon">☁️</div>
      <div class="graph-icon">🌥️</div>
      <div class="graph-icon">🌅</div>
      <div class="graph-icon">🌙</div>
    </div>
  </div>

  <!-- Rain Probability Bottom Row -->
  <div class="rain-probability">
    <div class="rain-item">
      <span class="rain-icon">💧</span>
      <span class="rain-percent">2%</span>
    </div>
    <div class="rain-item">
      <span class="rain-icon">💧</span>
      <span class="rain-percent">0%</span>
    </div>
    <div class="rain-item">
      <span class="rain-icon">💧</span>
      <span class="rain-percent">5%</span>
    </div>
    <div class="rain-item">
      <span class="rain-icon">💧</span>
      <span class="rain-percent">1%</span>
    </div>
    <div class="rain-item">
      <span class="rain-icon">💧</span>
      <span class="rain-percent">3%</span>
    </div>
    <div class="rain-item">
      <span class="rain-icon">💧</span>
      <span class="rain-percent">0%</span>
    </div>
    <div class="rain-item">
      <span class="rain-icon">💧</span>
      <span class="rain-percent">2%</span>
    </div>
  </div>
</div>
