<header class="header">
  <div class="header-left">
    <!-- Hamburger Toggle (Click to open/close, hover effect) -->
    <span
      class="icon hamburger"
      (click)="menuService.toggleMenu()"
      [class.open]="menuService.isMenuOpen()">
      ☰
    </span>

<!-- Nimbus Weather Hub Logo -->
    <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" (click)="refreshPage()">
      <defs>
        <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#0F172A" flood-opacity="0.2"/>
        </filter>
      </defs>
      
      <g filter="url(#shadow)">
        <ellipse cx="22" cy="38" rx="12" ry="10" fill="url(#cloudGrad)"/>
        <ellipse cx="36" cy="34" rx="16" ry="14" fill="url(#cloudGrad)"/>
        <ellipse cx="50" cy="38" rx="10" ry="9" fill="url(#cloudGrad)"/>
      </g>
      
      <ellipse cx="30" cy="32" rx="8" ry="6" fill="white" opacity="0.3"/>
    </svg>

    <!-- App Name -->
    <h1>Nimbus Weather Hub</h1>
  </div>

  <div class="header-right">
    <span
      [appTooltip]="'Dark Theme'"
      (click)="toggleTheme()"
      class="theme-icon">
      🌙
    </span>
  </div>
</header>
